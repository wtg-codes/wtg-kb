name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Sync Project Metadata
        run: ./scripts/sync-project-meta.sh

      - name: Run Compliance Bot
        run: ./scripts/check-compliance.sh

      - name: Verify README/Config Sync
        run: |
          CONFIG_URL=$(grep "url:" docusaurus.config.js | sed -E "s/.*'(.*)'.*/\1/")
          CONFIG_BASE=$(grep "baseUrl:" docusaurus.config.js | sed -E "s/.*'(.*)'.*/\1/")
          README_URL=$(grep "Live site:" README.md | sed -E "s/.*Live site: (.*)/\1/")
          EXPECTED="${CONFIG_URL}${CONFIG_BASE}"
          if [[ "$README_URL" != "$EXPECTED" ]]; then
            echo "❌ README link ($README_URL) out of sync with Config ($EXPECTED)"
            sh -c "false"
          fi
          echo "✅ README and Config are in sync."

      - name: Build Docusaurus site
        env:
          WEBPACK_BAR_DISABLE: 'true'
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
