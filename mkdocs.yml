site_name: WTG Knowledge Base
theme:
  name: material
  features:
    - navigation.tabs
    - search.suggest
    - search.highlight

plugins:
  - search
  # To use this, run: pip install mkdocs-llmstxt
  # - llmstxt:
  #     filename: llms.txt

nav:
